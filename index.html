<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:20px;
        }

        .container{
            width:90%;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#333;
        }

        .cards{
            display:flex;
            justify-content:space-around;
            margin-bottom:30px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            padding:20px;
            width:220px;
            text-align:center;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            margin:10px;
        }

        .charts{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        canvas{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        @media(max-width:768px){
            .charts{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Student Placement Prediction Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>150</h2>
            <p>Total Students</p>
        </div>

        <div class="card">
            <h2>95</h2>
            <p>Placed</p>
        </div>

        <div class="card">
            <h2>55</h2>
            <p>Not Placed</p>
        </div>

        <div class="card">
            <h2>63.3%</h2>
            <p>Placement Rate</p>
        </div>

    </div>

    <div class="charts">

        <canvas id="pieChart"></canvas>

        <canvas id="barChart"></canvas>

        <canvas id="lineChart"></canvas>

        <canvas id="scatterChart"></canvas>

    </div>

</div>

<script>

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: ["Placed", "Not Placed"],
        datasets: [{
            data: [95,55]
        }]
    },
    options:{
        plugins:{
            title:{
                display:true,
                text:"Placement Distribution"
            }
        }
    }
});

new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: ["6-7","7-8","8-9","9-10"],
        datasets: [{
            label: "Placement %",
            data: [35,62,84,96]
        }]
    },
    options:{
        plugins:{
            title:{
                display:true,
                text:"Placement Rate by CGPA"
            }
        }
    }
});

new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
        labels: ["0","1","2","3","4"],
        datasets: [{
            label: "Placement %",
            data: [32,58,76,89,95]
        }]
    },
    options:{
        plugins:{
            title:{
                display:true,
                text:"Internships vs Placement"
            }
        }
    }
});

new Chart(document.getElementById("scatterChart"), {
    type: "scatter",
    data: {
        datasets: [{
            label: "Projects vs Score",
            data: [
                {x:1,y:40},
                {x:2,y:52},
                {x:3,y:68},
                {x:4,y:79},
                {x:5,y:88},
                {x:6,y:95}
            ]
        }]
    },
    options:{
        plugins:{
            title:{
                display:true,
                text:"Projects vs Placement Score"
            }
        },
        scales:{
            x:{
                title:{
                    display:true,
                    text:"Projects"
                }
            },
            y:{
                title:{
                    display:true,
                    text:"Placement Score"
                }
            }
        }
    }
});

</script>

</body>
</html>
<form action="/predict" method="POST">

    <input type="number" step="0.01"
           name="cgpa"
           placeholder="Enter CGPA"
           required>

    <input type="number"
           name="internships"
           placeholder="Internships"
           required>

    <input type="number"
           name="projects"
           placeholder="Projects"
           required>

    <button type="submit">
        Predict
    </button>

</form>

{% if prediction %}
    <h2>{{ prediction }}</h2>
{% endif %}
